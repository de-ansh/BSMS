services:
  db:
    image: postgres:16-alpine
    container_name: bsms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bsms
      POSTGRES_USER: bsms
      POSTGRES_PASSWORD: bsms
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
